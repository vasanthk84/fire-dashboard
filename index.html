<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIRE Architect Pro | Freedom Edition</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #334155;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --accent-green: #10b981;
      --accent-orange: #f59e0b;
      --accent-purple: #8b5cf6;
      --accent-pink: #ec4899;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      background-image: radial-gradient(#1e293b 1px, transparent 1px);
      background-size: 24px 24px;
      padding-bottom: 50px;
    }
    .app-container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .input-deck {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .deck-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }
    .card-header {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    .card-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .input-wrapper {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .input-wrapper label {
      font-size: 0.65rem;
      color: var(--text-muted);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .input-wrapper input {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 6px 8px;
      border-radius: 5px;
      font-size: 0.8rem;
      width: 100%;
      height: 32px;
    }
    .input-wrapper input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .action-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 24px;
    }
    .btn-run {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0 24px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      font-size: 0.85rem;
      height: 38px;
      min-width: 150px;
    }
    .btn-run:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }
    .btn-dl {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .btn-dl:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    .stats-deck {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      transition: transform 0.2s;
    }
    .stat-card:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, var(--bg-card), rgba(99, 102, 241, 0.1));
      border-color: rgba(99, 102, 241, 0.3);
    }
    .stat-title {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-num {
      font-size: 1.6rem;
      font-weight: 700;
      margin-top: 6px;
    }
    .stat-subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .progress-wrapper {
      margin-top: 8px;
      background: var(--bg-dark);
      border-radius: 6px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent-green));
      transition: width 0.3s ease;
    }
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: var(--bg-card);
      padding: 4px;
      border-radius: 8px;
      width: fit-content;
      border: 1px solid var(--border);
    }
    .tab {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tab.active {
      background: var(--bg-input);
      color: white;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }
    .chart-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      min-height: 450px;
    }
    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .chart-title {
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chart-wrapper {
      width: 100%;
      min-height: 380px;
    }
    .table-wrapper {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: rgba(15, 23, 42, 0.5);
      padding: 12px 16px;
      text-align: left;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    td {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      font-family: 'SF Mono', monospace;
    }
    tr:hover td { background: rgba(255, 255, 255, 0.02); }
    .milestone-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-right: 4px;
    }
    .milestone-tag.life { background: rgba(16, 185, 129, 0.2); color: #10b981; }
    .milestone-tag.expense { background: rgba(236, 72, 153, 0.2); color: #ec4899; }
    .milestone-tag.wealth { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .milestone-tag.milestone { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; }
    .analysis-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
    }
    .expense-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      height: fit-content;
    }
    .expense-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 0.85rem;
    }
    .expense-row label {
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .expense-row input {
      width: 90px;
      text-align: right;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 6px;
      border-radius: 4px;
      font-size: 0.85rem;
    }
    .total-expense {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      padding-top: 12px;
      margin-top: 12px;
      border-top: 2px solid var(--border);
      font-size: 1rem;
      color: var(--accent-green);
    }
    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
    }
    .one-time-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .one-time-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }
    .tax-proof-card {
      margin-top: 16px;
      padding: 12px;
      background: rgba(236, 72, 153, 0.1);
      border: 1px solid rgba(236, 72, 153, 0.2);
      border-radius: 8px;
      font-size: 0.85rem;
    }
    .tax-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      color: var(--text-muted);
    }
    .tax-row.final {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(236, 72, 153, 0.3);
      font-weight: 700;
      color: var(--accent-green);
    }
    
    /* Modern FIRE Calculator Styles */
    .fire-calculator-panel {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 24px;
      padding: 24px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(139, 92, 246, 0.05) 100%);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }
    
    .fire-calculator-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.5), transparent);
    }
    
    .fire-calc-card {
      position: relative;
      padding: 20px;
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .fire-calc-card:hover {
      transform: translateY(-2px);
      border-color: rgba(99, 102, 241, 0.3);
      box-shadow: 0 8px 16px rgba(99, 102, 241, 0.15);
    }
    
    .fire-calc-card.highlight {
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.1) 0%, rgba(245, 158, 11, 0.05) 100%);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }
    
    .fire-calc-card.highlight:hover {
      border-color: rgba(245, 158, 11, 0.5);
      box-shadow: 0 8px 16px rgba(245, 158, 11, 0.2);
    }
    
    .fire-calc-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .fire-calc-label::before {
      content: '';
      width: 3px;
      height: 12px;
      background: linear-gradient(180deg, var(--primary), var(--accent-purple));
      border-radius: 2px;
    }
    
    .fire-calc-card.highlight .fire-calc-label::before {
      background: linear-gradient(180deg, var(--accent-orange), var(--accent-pink));
    }
    
    .fire-calc-value {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      line-height: 1.2;
    }
    
    .fire-calc-card.highlight .fire-calc-value {
      background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .fire-calc-subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .fire-calc-input-wrapper {
      position: relative;
    }
    
    .fire-calc-input {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.2);
      color: var(--text-main);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 1.5rem;
      font-weight: 700;
      transition: all 0.2s;
      text-align: center;
    }
    
    .fire-calc-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      background: rgba(15, 23, 42, 0.8);
    }
    
    .fire-calc-input:read-only {
      cursor: default;
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.2);
      color: var(--accent-green);
    }
    
    .multiplier-input-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .multiplier-input-group input {
      flex: 1;
      text-align: center;
    }
    
    .multiplier-symbol {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-muted);
      opacity: 0.5;
    }
    
    .fire-calc-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--primary);
      margin-top: 8px;
    }
    
    .fire-calc-card.highlight .fire-calc-badge {
      background: rgba(245, 158, 11, 0.15);
      border-color: rgba(245, 158, 11, 0.3);
      color: var(--accent-orange);
    }
    
    /* Snapshot Management Styles */
    .snapshot-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    
    .snapshot-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    
    .snapshot-title {
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-main);
    }
    
    .current-model-card {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.05));
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    
    .model-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }
    
    .summary-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .summary-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .summary-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-green);
    }
    
    .snapshot-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .btn-snapshot {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      font-size: 0.85rem;
    }
    
    .btn-snapshot:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }
    
    .btn-snapshot.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
    
    .btn-snapshot.secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(99, 102, 241, 0.05);
    }
    
    .btn-snapshot.danger {
      background: transparent;
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
    }
    
    .btn-snapshot.danger:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: #ef4444;
    }
    
    .snapshot-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .snapshot-item {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }
    
    .snapshot-item:hover {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.05);
    }
    
    .snapshot-item.selected {
      border-color: var(--accent-green);
      background: rgba(16, 185, 129, 0.05);
    }
    
    .snapshot-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .snapshot-label {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .snapshot-date {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    
    .snapshot-metrics {
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
      margin-top: 4px;
    }
    
    .metric {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--text-muted);
    }
    
    .metric-value {
      font-weight: 600;
      color: var(--text-main);
    }
    
    .snapshot-item-actions {
      display: flex;
      gap: 8px;
    }
    
    .btn-icon {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      width: 36px;
      height: 36px;
    }
    
    .btn-icon:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(99, 102, 241, 0.05);
    }
    
    .btn-icon.danger:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: rgba(239, 68, 68, 0.05);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    
    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.3;
    }
    
    .comparison-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .comparison-card {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    
    .comparison-header {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    
    .change-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    .change-indicator.positive {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent-green);
    }
    
    .change-indicator.negative {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }
    
    .change-indicator.neutral {
      background: rgba(148, 163, 184, 0.15);
      color: var(--text-muted);
    }
    
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    
    .modal-title {
      font-size: 1.2rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .modal-close:hover {
      color: var(--text-main);

    .form-group {
      margin-bottom: 16px;
    }
    
    .form-label {
      display: block;

      font-weight: 600;

    .form-input {
      width: 100%;
      background: var(--bg-dark);

      padding: 10px 12px;

      font-size: 0.9rem;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary);

    textarea.form-input {
      min-height: 80px;

      font-family: inherit;

    .tag-input-wrapper {

      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: rgba(99, 102, 241, 0.15);

      border-radius: 12px;
      font-size: 0.75rem;
      color: var(--primary);

    .tag-remove {
      background: transparent;
      border: none;

      cursor: pointer;

      display: flex;
      align-items: center;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const Icon = ({ name }) => React.createElement('i', { 'data-lucide': name });

    function ApexChartComponent({ type, series, options }) {
      const chartRef = React.useRef(null);
      const chartInstance = React.useRef(null);

      useEffect(() => {
        if (chartRef.current && series && series.length > 0) {
          if (chartInstance.current) {
            chartInstance.current.destroy();
          }
          chartInstance.current = new ApexCharts(chartRef.current, { 
            chart: { type, ...options.chart }, 
            series, 
            ...options 
          });
          chartInstance.current.render();
        }
        return () => {
          if (chartInstance.current) {
            chartInstance.current.destroy();
            chartInstance.current = null;
          }
        };
      }, [type, series, options]);

      React.useEffect(() => { lucide.createIcons(); });

      return <div ref={chartRef} style={{ width: '100%', height: '100%' }} />;
    }

    function App() {
      const [inputs, setInputs] = useState({
        startYear: 2025, retirementYear: 2035, returnYear: 2030, withdraw401kYear: 2033,
        mfCurrent: 122, mfPrincipal: 85, stocksIndia: 29.6, usStocks: 16, emergencyFund: 10,
        us401k: 52000, usdExchangeRate: 95, epfCurrent: 62.93, basicPay: 34900,
        epfRate: 0.0825, vpfRate: 0.88, bondsInitial: 18, bondAnnualIncrease: 0.01,
        bondRate: 0.10, mfSIP: 1.2, sipStepUpRate: 0.10, optionSellingMonthly: 0.20,
        annualSalary: 94000, mfRate: 0.12, stocksRate: 0.15, usRate: 0.12,
        inflationRate: 0.06, monthlyExpenses: 0, oneTimeExpenseTotal: 0, applyTax: false,
        fireMultiplier: 25, enableRebalancing: false, targetEquityPre: 80,
        targetEquityPost: 60, glideYears: 10
      });

      const [results, setResults] = useState(null);
      const [activeTab, setActiveTab] = useState('journey');
      const [selectedWithdrawalRate, setSelectedWithdrawalRate] = useState('4%');
      const [expenses, setExpenses] = useState({
        rent: 0, groceries: 0, utilities: 0, transport: 0, health: 0, entertainment: 0, misc: 0
      });
      const [oneTimeExpenses, setOneTimeExpenses] = useState({
        homeBuying: 0, carBuying: 0, renovation: 0, wedding: 0, misc: 0
      });
      const [showOneTime, setShowOneTime] = useState(false);
      const [useBuckets, setUseBuckets] = useState(false);

      // Snapshot Management State
      const [snapshots, setSnapshots] = useState([]);
      const [selectedSnapshots, setSelectedSnapshots] = useState([]);
      const [showSaveModal, setShowSaveModal] = useState(false);
      const [snapshotLabel, setSnapshotLabel] = useState('');
      const [snapshotNotes, setSnapshotNotes] = useState('');
      const [snapshotTags, setSnapshotTags] = useState([]);

      // Load snapshots from localStorage on mount
      useEffect(() => {
        const saved = localStorage.getItem('fire-snapshots');
        if (saved) {
          try {
            setSnapshots(JSON.parse(saved));
          } catch (e) {
            console.error('Failed to load snapshots:', e);
          }
        }
      }, []);

      // Save snapshots to localStorage whenever they change
      useEffect(() => {
        if (snapshots.length > 0) {
          localStorage.setItem('fire-snapshots', JSON.stringify(snapshots));
        }
      }, [snapshots]);

      // Snapshot Functions
      const saveSnapshot = () => {
        if (!results) {
          alert('Please run calculation first');
          return;
        }

        const snapshot = {
          modelId: `snap_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
          snapshotDate: new Date().toISOString(),
          label: snapshotLabel || `Snapshot ${new Date().toLocaleDateString()}`,
          tags: snapshotTags,
          notes: snapshotNotes,
          
          // Financial Reality Parameters (what triggers new model)
          assets: {
            mfCurrent: inputs.mfCurrent,
            stocksIndia: inputs.stocksIndia,
            usStocks: inputs.usStocks,
            emergencyFund: inputs.emergencyFund,
            epfCurrent: inputs.epfCurrent,
            bondsInitial: inputs.bondsInitial,
            us401k: inputs.us401k,
            usdExchangeRate: inputs.usdExchangeRate
          },
          
          flows: {
            mfSIP: inputs.mfSIP,
            sipStepUpRate: inputs.sipStepUpRate,
            optionSellingMonthly: inputs.optionSellingMonthly,
            annualSalary: inputs.annualSalary,
            basicPay: inputs.basicPay
          },
          
          growthRates: {
            mfRate: inputs.mfRate,
            stocksRate: inputs.stocksRate,
            usRate: inputs.usRate,
            inflationRate: inputs.inflationRate
          },
          
          bonds: {
            bondsInitial: inputs.bondsInitial,
            bondAnnualIncrease: inputs.bondAnnualIncrease,
            bondRate: inputs.bondRate
          },
          
          expenses: {
            monthly: {...expenses},
            oneTime: showOneTime ? {...oneTimeExpenses} : {}
          },
          
          // Calculated Results (cached)
          results: {
            currentWealth: results.summary.startWealth,
            projectedRetirement: results.summary.finalWealth,
            fireNumber: fireNumberLakhs,
            yearsToFI: yearsToFI,
            progressToFire: progressToFire
          },
          
          // Planning Parameters (context only)
          planningParams: {
            startYear: inputs.startYear,
            retirementYear: inputs.retirementYear,
            returnYear: inputs.returnYear,
            withdraw401kYear: inputs.withdraw401kYear,
            applyTax: inputs.applyTax,
            fireMultiplier: inputs.fireMultiplier
          }
        };

        setSnapshots(prev => [snapshot, ...prev]);
        setShowSaveModal(false);
        setSnapshotLabel('');
        setSnapshotNotes('');
        setSnapshotTags([]);
      };

      const deleteSnapshot = (modelId) => {
        if (confirm('Delete this snapshot?')) {
          setSnapshots(prev => prev.filter(s => s.modelId !== modelId));
          setSelectedSnapshots(prev => prev.filter(id => id !== modelId));
        }
      };

      const toggleSnapshotSelection = (modelId) => {
        setSelectedSnapshots(prev => 
          prev.includes(modelId) 
            ? prev.filter(id => id !== modelId)
            : [...prev, modelId]
        );
      };

      const loadSnapshot = (modelId) => {
        const snapshot = snapshots.find(s => s.modelId === modelId);
        if (!snapshot) return;

        // Load all financial parameters
        setInputs(prev => ({
          ...prev,
          ...snapshot.assets,
          ...snapshot.flows,
          ...snapshot.growthRates,
          ...snapshot.bonds,
          ...snapshot.planningParams
        }));

        setExpenses(snapshot.expenses.monthly);
        setOneTimeExpenses(snapshot.expenses.oneTime);
        setShowOneTime(Object.keys(snapshot.expenses.oneTime).length > 0);

        // Trigger recalculation
        setTimeout(() => calculate(), 100);
      };

      const exportSnapshots = () => {
        const data = {
          version: '1.0',
          exportDate: new Date().toISOString(),
          snapshots: snapshots
        };
        
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `FIRE-Snapshots-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const importSnapshots = (event) => {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (data.version && data.snapshots) {
              const existingIds = new Set(snapshots.map(s => s.modelId));
              const newSnapshots = data.snapshots.filter(s => !existingIds.has(s.modelId));
              const duplicates = data.snapshots.length - newSnapshots.length;
              
              if (newSnapshots.length > 0) {
                setSnapshots(prev => [...newSnapshots, ...prev]);
              }
              
              // Better feedback message
              if (duplicates > 0 && newSnapshots.length > 0) {
                alert(`Imported ${newSnapshots.length} new snapshots.\n${duplicates} duplicate(s) skipped.`);
              } else if (duplicates > 0 && newSnapshots.length === 0) {
                alert(`All ${duplicates} snapshot(s) already exist.\nNo new snapshots imported.`);
              } else {
                alert(`Successfully imported ${newSnapshots.length} snapshot(s)!`);
              }
              
              // Reset the file input so same file can be imported again if needed
              event.target.value = '';
            } else {
              alert('Invalid snapshot file format');
            }
          } catch (err) {
            alert('Failed to import: ' + err.message);
          }
        };
        reader.readAsText(file);
      };

      const addTag = (tag) => {
        if (tag && !snapshotTags.includes(tag)) {
          setSnapshotTags(prev => [...prev, tag]);
        }
      };

      const removeTag = (tag) => {
        setSnapshotTags(prev => prev.filter(t !== tag));
      };

      const handleInput = (key, value) => setInputs(prev => ({ ...prev, [key]: value }));

      const handleExpense = (key, value) => {
        const newExpenses = { ...expenses, [key]: parseFloat(value) || 0 };
        setExpenses(newExpenses);
        // Auto-recalculate when expenses change
        if (results) {
          const totalMonthly = Object.values(newExpenses).reduce((a, b) => a + b, 0);
          calculate({ monthlyExpenses: totalMonthly });
        }
      };

      const handleOneTime = (key, value) => {
        setOneTimeExpenses(prev => {
          const updated = { ...prev, [key]: parseFloat(value) || 0 };
          // Auto-recalculate when one-time expenses change
          if (results && showOneTime) {
            const total = Object.values(updated).reduce((a, b) => a + b, 0);
            calculate({ oneTimeExpenseTotal: total });
          }
          return updated;
        });
      };

      const calculate = async (overrides = {}) => {
        try {
          const totalMonthly = Object.values(expenses).reduce((a, b) => a + b, 0);
          const totalOneTime = showOneTime ? Object.values(oneTimeExpenses).reduce((a, b) => a + b, 0) : 0;
          const payload = { 
            ...inputs, 
            monthlyExpenses: totalMonthly,
            oneTimeExpenseTotal: totalOneTime,
            ...overrides 
          };
          const response = await fetch('/api/calculate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await response.json();
          setResults(data);
        } catch (error) {
          console.error('Calculation error:', error);
        }
      };

      const downloadExcel = async () => {
        try {
          const response = await fetch('/api/generate-excel', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...results, expenses, oneTimeExpenses, inputs })
          });
          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'FIRE_Freedom_Plan_Pro.xlsx';
          a.click();
          window.URL.revokeObjectURL(url);
        } catch (error) {
          console.error('Excel generation error:', error);
        }
      };

      useEffect(() => { lucide.createIcons(); });

      // FIRE Calculations
      const currentMonthlyExp = useMemo(() => Object.values(expenses).reduce((a, b) => a + b, 0), [expenses]);
      const currentAnnualExp = currentMonthlyExp * 12;
      const taxDrag = inputs.applyTax ? 0.125 : 0;
      
      const fireNumberLakhs = useMemo(() => {
        if (currentAnnualExp === 0) return 0;
        return (currentAnnualExp * inputs.fireMultiplier) / (1 - taxDrag) / 100000;
      }, [currentAnnualExp, inputs.fireMultiplier, taxDrag]);

      const currentWealthLakhs = results ? results.summary.startWealth :
        (inputs.mfCurrent + inputs.stocksIndia + inputs.usStocks + inputs.emergencyFund + 
         inputs.epfCurrent + inputs.bondsInitial);

      const progressToFire = fireNumberLakhs > 0 ? Math.min((currentWealthLakhs / fireNumberLakhs) * 100, 100) : 0;

      const yearsToFI = useMemo(() => {
        if (!results || fireNumberLakhs <= 0) return null;
        const proj = results.fireProjections;
        for (let i = 0; i < proj.length; i++) {
          if (proj[i].total >= fireNumberLakhs) return i;
        }
        return null;
      }, [results, fireNumberLakhs]);

      // Chart Data
      const equityAllocationData = useMemo(() => {
        if (!results) return { drift: [], rebalanced: [], target: [], years: [] };
        const years = results.fireProjections.map(p => p.year);
        const drift = [], rebalanced = [], target = [];
        let prevEquity = 0, prevFixed = 0;

        results.fireProjections.forEach((p, i) => {
          const isPostRetirement = p.year >= inputs.retirementYear;
          const yearsSinceRetire = p.year - inputs.retirementYear;
          let targetPct = inputs.targetEquityPre;
          
          if (isPostRetirement && inputs.glideYears > 0) {
            const progress = Math.min(yearsSinceRetire / inputs.glideYears, 1);
            targetPct = inputs.targetEquityPre + progress * (inputs.targetEquityPost - inputs.targetEquityPre);
          } else if (isPostRetirement) {
            targetPct = inputs.targetEquityPost;
          }
          target.push(Math.round(targetPct));

          const equity = p.mf + p.stocksIndia + p.usStocks;
          const total = p.total || 1;
          drift.push(Math.round((equity / total) * 100));

          if (inputs.enableRebalancing) {
            if (i === 0) {
              prevEquity = equity;
              prevFixed = total - equity;
              rebalanced.push(drift[0]);
            } else {
              let grownEquity = prevEquity * (1 + inputs.mfRate);
              let grownFixed = prevFixed * 0.07;
              let grownTotal = grownEquity + grownFixed;
              let targetEquityAmt = grownTotal * (targetPct / 100);
              grownEquity = targetEquityAmt;
              grownFixed = grownTotal - targetEquityAmt;
              rebalanced.push(Math.round((grownEquity / grownTotal) * 100));
              prevEquity = grownEquity;
              prevFixed = grownFixed;
            }
          }
        });

        return { drift, rebalanced: inputs.enableRebalancing ? rebalanced : [], target, years };
      }, [results, inputs.enableRebalancing, inputs.targetEquityPre, inputs.targetEquityPost, 
          inputs.glideYears, inputs.retirementYear, inputs.mfRate]);

      const equityPctSeries = useMemo(() => {
        const series = [{ name: 'Natural Drift', data: equityAllocationData.drift }];
        if (inputs.enableRebalancing) {
          series.push({ name: 'With Rebalancing', data: equityAllocationData.rebalanced });
        }
        series.push({ name: 'Target Equity %', data: equityAllocationData.target });
        return series;
      }, [equityAllocationData, inputs.enableRebalancing]);

      const equityPctOptions = useMemo(() => ({
        chart: { 
          type: 'area',
          height: 380,
          toolbar: { show: true }
        },
        xaxis: { 
          categories: equityAllocationData.years,
          labels: {
            style: { colors: '#94a3b8', fontSize: '11px' },
            rotate: -45,
            rotateAlways: false
          }
        },
        yaxis: {
          labels: { style: { colors: '#94a3b8' } }
        },
        colors: ['#f59e0b', '#10b981', '#6366f1'],
        fill: { opacity: [0.6, 0.4, 0] },
        stroke: { width: [3, 3, 2], dashArray: [0, 0, 5] },
        legend: {
          labels: { colors: '#94a3b8' }
        },
        tooltip: { theme: 'dark' },
        annotations: {
          yaxis: [{
            y: 80,
            borderColor: '#ef4444',
            label: { 
              text: 'High Risk Zone', 
              style: { color: '#fff', background: '#ef4444' } 
            }
          }]
        }
      }), [equityAllocationData.years]);

      const netWorthSeries = useMemo(() => {
        if (!results) return [];
        return [
          { name: 'Mutual Funds', data: results.fireProjections.map(p => parseFloat(p.mf.toFixed(2))) },
          { name: 'Stocks India', data: results.fireProjections.map(p => parseFloat(p.stocksIndia.toFixed(2))) },
          { name: 'EPF', data: results.fireProjections.map(p => parseFloat(p.epf.toFixed(2))) },
          { name: 'Bonds', data: results.fireProjections.map(p => parseFloat(p.bonds.toFixed(2))) }
        ];
      }, [results]);

      const netWorthOptions = useMemo(() => {
        if (!results) return {};
        return {
          chart: {
            type: 'bar',
            stacked: true,
            height: 380,
            toolbar: {
              show: true,
              offsetX: 0,
              offsetY: -5,
              tools: {
                download: true,
                selection: true,
                zoom: true,
                zoomin: true,
                zoomout: true,
                pan: true,
                reset: true
              },
              autoSelected: 'zoom'
            },
            zoom: {
              enabled: true,
              type: 'x',
              autoScaleYaxis: true,
              zoomedArea: {
                fill: {
                  color: '#6366f1',
                  opacity: 0.1
                },
                stroke: {
                  color: '#6366f1',
                  opacity: 0.4,
                  width: 1
                }
              }
            },
            selection: {
              enabled: true,
              type: 'x',
              fill: {
                color: '#6366f1',
                opacity: 0.1
              },
              stroke: {
                width: 1,
                dashArray: 3,
                color: '#6366f1',
                opacity: 0.4
              }
            }
          },
          plotOptions: {
            bar: {
              borderRadius: 4,
              columnWidth: '80%',
              dataLabels: {
                position: 'center'
              }
            }
          },
          xaxis: {
            categories: results.fireProjections.map(p => p.year),
            labels: {
              style: { colors: '#94a3b8', fontSize: '11px' },
              rotate: -45,
              rotateAlways: true,
              hideOverlappingLabels: false
            },
            tickPlacement: 'on'
          },
          yaxis: {
            labels: {
              style: { colors: '#94a3b8' },
              formatter: (val) => val >= 100 ? `${(val / 100).toFixed(1)}Cr` : `${val.toFixed(0)}L`
            }
          },
          colors: ['#6366f1', '#f59e0b', '#8b5cf6', '#10b981'],
          fill: { opacity: 0.95 },
          stroke: { width: 0 },
          dataLabels: { enabled: false },
          legend: {
            position: 'bottom',
            horizontalAlign: 'center',
            offsetY: 5,
            labels: { colors: '#94a3b8' },
            markers: {
              width: 12,
              height: 12,
              radius: 3
            }
          },
          tooltip: {
            theme: 'dark',
            shared: true,
            intersect: false,
            y: {
              formatter: (val, { seriesIndex, dataPointIndex }) => {
                const total = results.fireProjections[dataPointIndex].total;
                const pct = total > 0 ? (val / total * 100).toFixed(1) : 0;
                return `${fmtL(val)} (${pct}%)`;
              }
            }
          },
          grid: {
            borderColor: '#334155',
            strokeDashArray: 4
          }
        };
      }, [results]);

      const incomeExpenseSeries = useMemo(() => {
        if (!results) return [];
        const expenseData = results.fireProjections.map(p => 
          p.year < inputs.returnYear ? null : p.calculatedMonthlyExpense
        );
        const passiveData = results.fireProjections.map(p => 
          parseFloat(p.passiveIncomeMonthly.toFixed(2))
        );
        return [
          { name: `Passive Income ${inputs.applyTax ? '(Post-Tax)' : ''}`, type: 'area', data: passiveData },
          { name: 'Inflated Expenses', type: 'line', data: expenseData }
        ];
      }, [results, inputs.returnYear, inputs.applyTax]);

      const incomeExpenseOptions = useMemo(() => {
        if (!results) return {};
        return {
          chart: { height: 380, toolbar: { show: true } },
          xaxis: { 
            categories: results.fireProjections.map(p => p.year),
            labels: {
              style: { colors: '#94a3b8', fontSize: '11px' },
              rotate: -45
            }
          },
          yaxis: {
            labels: { style: { colors: '#94a3b8' } }
          },
          colors: ['#00e396', '#ff9f43'],
          fill: { 
            type: ['gradient', 'solid'], 
            gradient: { 
              shadeIntensity: 1, 
              opacityFrom: 0.7, 
              opacityTo: 0.1, 
              stops: [0, 90, 100] 
            } 
          },
          stroke: { width: [3, 3], curve: 'smooth' },
          legend: {
            labels: { colors: '#94a3b8' }
          },
          tooltip: { theme: 'dark' },
          annotations: {
            xaxis: [
              { 
                x: inputs.returnYear, 
                strokeDashArray: 0, 
                borderColor: '#00cfe8', 
                label: { 
                  borderColor: '#00cfe8', 
                  style: { color: '#000', background: '#00cfe8' }, 
                  text: 'India Return' 
                } 
              },
              { 
                x: inputs.retirementYear, 
                strokeDashArray: 0, 
                borderColor: '#fbbf24', 
                label: { 
                  borderColor: '#fbbf24', 
                  style: { color: '#000', background: '#fbbf24' }, 
                  text: 'Retire' 
                } 
              }
            ]
          }
        }
      }, [results, inputs.returnYear, inputs.retirementYear]);

      const swrScenarios = useMemo(() => {
        if (!results) return {};
        const baseCorpusLakhs = results.summary.finalWealth;
        const swr = 1 / inputs.fireMultiplier;
        const scenarios = {
          'Good (14% avg)': { annualReturn: 0.14, color: '#10b981' },
          'Average (12% avg)': { annualReturn: 0.12, color: '#6366f1' },
          'Bad Sequence (-30% first 5y, then 12%)': { annualReturn: null, color: '#ef4444' }
        };
        const output = {};
        Object.entries(scenarios).forEach(([name, cfg]) => {
          let corpus = baseCorpusLakhs;
          const data = [];
          for (let y = 0; y <= 25; y++) {
            const withdrawalAnnual = corpus * swr;
            let ret = cfg.annualReturn;
            if (name.includes('Bad') && y < 5) ret = -0.30;
            else if (name.includes('Bad') && y >= 5) ret = 0.12;
            corpus = corpus * (1 + (ret ?? 0)) - withdrawalAnnual;
            data.push({ year: inputs.retirementYear + y, corpusEnd: parseFloat(corpus.toFixed(2)) });
            if (corpus <= 0) break;
          }
          output[name] = { data, color: cfg.color };
        });
        return output;
      }, [results, inputs.fireMultiplier, inputs.retirementYear]);

      const fmtL = (val) => val >= 100 ? `₹${(val / 100).toFixed(2)}Cr` : `₹${val.toFixed(1)}L`;

      const renderMilestones = (milestones) => {
        if (!milestones || milestones.length === 0) return null;
        return milestones.map((m, i) => 
          <span key={i} className={`milestone-tag ${m.type}`}>{m.text}</span>
        );
      };

      const sampleTaxYear = results ?

                        const first = selected[0];
                        const last = selected[selected.length - 1];
                        
                        const monthsElapsed = Math.round(
                          (new Date(last.snapshotDate) - new Date(first.snapshotDate)) / 
                          (1000 * 60 * 60 * 24 * 30)
                        );

                        const avgGrowthRate = (first.growthRates.mfRate + first.growthRates.stocksRate) / 2;
                        const monthlyRate = avgGrowthRate / 12;
                        const expectedWealth = first.results.currentWealth * Math.pow(1 + monthlyRate, monthsElapsed) +
                                             (first.flows.mfSIP * monthsElapsed);
                        
                        const variance = last.results.currentWealth - expectedWealth;
                        const variancePct = (variance / expectedWealth) * 100;
                        const isAhead = variance > 0;

                        return (
                          <div style={{
                            background: isAhead 
                              ? 'linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05))'
                              : 'linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.05))',
                            border: `1px solid ${isAhead ? 'rgba(16, 185, 129, 0.3)' : 'rgba(239, 68, 68, 0.3)'}`,
                            borderRadius: '12px',
                            padding: '20px',
                            marginTop: '20px'
                          }}>
                            <div style={{ 
                              fontSize: '1rem', 
                              fontWeight: '600',
                              marginBottom: '16px',
                              display: 'flex',
                              alignItems: 'center',
                              gap: '8px'
                            }}>
                              <Icon name={isAhead ? 'trending-up' : 'trending-down'} />
                              Reality vs Projection Analysis
                            </div>
                            <div style={{ 
                              display: 'grid',
                              gridTemplateColumns: 'repeat(3, 1fr)',
                              gap: '16px',
                              marginBottom: '12px'
                            }}>
                              <div>
                                <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>
                                  Expected ({first.label})
                                </div>
                                <div style={{ fontSize: '1.2rem', fontWeight: '700' }}>
                                  {fmtL(expectedWealth)}
                                </div>
                              </div>
                              <div>
                                <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>
                                  Actual ({last.label})
                                </div>
                                <div style={{ fontSize: '1.2rem', fontWeight: '700', color: 'var(--accent-green)' }}>
                                  {fmtL(last.results.currentWealth)}
                                </div>
                              </div>
                              <div>
                                <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>
                                  Variance
                                </div>
                                <div style={{ 
                                  fontSize: '1.2rem', 
                                  fontWeight: '700',
                                  color: isAhead ? 'var(--accent-green)' : '#ef4444'
                                }}>
                                  {isAhead ? '+' : ''}{fmtL(variance)}
                                  <span style={{ fontSize: '0.9rem', marginLeft: '4px' }}>
                                    ({variancePct > 0 ? '+' : ''}{variancePct.toFixed(1)}%)
                                  </span>
                                </div>
                              </div>
                            </div>
                            <div style={{ 
                              fontSize: '0.85rem',
                              padding: '12px',
                              background: 'rgba(0, 0, 0, 0.2)',
                              borderRadius: '8px'
                            }}>
                              <strong>{isAhead ? '🎉 Excellent progress!' : '⚠️ Behind projection'}</strong>
                              {' '}
                              Over {monthsElapsed} months, you're{' '}
                              <strong style={{ color: isAhead ? 'var(--accent-green)' : '#ef4444' }}>
                                {Math.abs(variancePct).toFixed(1)}% {isAhead ? 'ahead' : 'behind'}
                              </strong>
                              {' '}of your original projection.
                              {isAhead && ' Keep up the great work!'}
                              {!isAhead && ' Consider reviewing your SIP amounts or asset allocation.'}
                            </div>
                          </div>
                        );
                      })()}
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {/* Save Snapshot Modal */}
          {showSaveModal && (
            <div className="modal-overlay" onClick={() => setShowSaveModal(false)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <div className="modal-header">
                  <div className="modal-title">
                    <Icon name="save" />
                    Save Snapshot
                </div>
                <button className="modal-close" onClick={() => setShowSaveModal(false)}>
                  <Icon name="x" />
                </button>
              </div>

              <div className="form-group">
                <label className="form-label">Label (optional)</label>
                <input
                  type="text"
                  className="form-input"
                  placeholder="e.g., Dec 2025 - Year End Review"
                  value={snapshotLabel}
                  onChange={e => setSnapshotLabel(e.target.value)}
                />
              </div>

              <div className="form-group">
                <label className="form-label">Tags (optional)</label>
                <div className="tag-input-wrapper">
                  {snapshotTags.map(tag => (
                    <span key={tag} className="tag">
                      {tag}
                      <button className="tag-remove" onClick={() => removeTag(tag)}>×</button>
                    </span>
                  ))}
                  <input
                    type="text"
                    className="form-input"
                    placeholder="Add tag and press Enter"
                    onKeyPress={e => {
                      if (e.key === 'Enter') {
                        addTag(e.target.value.trim());
                        e.target.value = '';
                      }
                    }}
                    style={{ flex: 1, minWidth: '120px' }}
                  />
                </div>
              </div>

              <div className="form-group">
                <label className="form-label">Notes (optional)</label>
                <textarea
                  className="form-input"
                  placeholder="e.g., Received year-end bonus, increased SIP by 20%"
                  value={snapshotNotes}
                  onChange={e => setSnapshotNotes(e.target.value)}
                  rows="3"
                />
              </div>

              <div style={{ 
                background: 'rgba(99, 102, 241, 0.05)', 
                padding: '16px', 
                borderRadius: '8px',
                marginBottom: '16px'
              }}>
                <div style={{ fontSize: '0.85rem', fontWeight: '600', marginBottom: '8px' }}>
                  📊 Snapshot Summary
                </div>
                <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)', display: 'flex', flexDirection: 'column', gap: '4px' }}>
                  <div>• Total Wealth: {fmtL(currentWealthLakhs)}</div>
                  <div>• FIRE Progress: {progressToFire.toFixed(1)}%</div>
                  {yearsToFI !== null && <div>• Years to FIRE: {yearsToFI}y</div>}
                </div>
              </div>

              <div style={{ display: 'flex', gap: '12px', justifyContent: 'flex-end' }}>
                <button 
                  className="btn-snapshot secondary" 
                  onClick={() => setShowSaveModal(false)}
                >
                  Cancel
                </button>
                <button 
                  className="btn-snapshot" 
                  onClick={saveSnapshot}
                >
                  <Icon name="save" />
                  Save Snapshot
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
